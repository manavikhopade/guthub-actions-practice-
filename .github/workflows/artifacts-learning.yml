name: Understanding Job Artifacts
on: 
  push:
    branches: 
      - main
  workflow_dispatch:
jobs:
  'Upload':
    runs-on: ubuntu-latest
    steps: 
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Upload artifacts 
      uses: actions/upload-artifact@v4
      with:
        name: readme
        path: README.md
  'Get':
    runs-on: ubuntu-latest
    steps: 
    - name: Check o/p
      run: ls -la
    - name: Get artifcats
      uses: actions/download-artifact@v4
      with:
        name: readme
